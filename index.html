<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angebote kochen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500&display=swap');

  :root {
    --bg:       #0f0f0f;
    --surface:  #1a1a1a;
    --border:   #2a2a2a;
    --accent:   #c8f135;
    --accent2:  #ff6b35;
    --text:     #f0f0f0;
    --muted:    #666;
    --badge-bg: rgba(200,241,53,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    padding: 48px 32px 32px;
    max-width: 1100px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }

  .header-label {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    line-height: 1.05;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    margin-top: 12px;
    color: var(--muted);
    font-size: 14px;
  }

  .market-note {
    margin-top: 16px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.5;
    max-width: 600px;
  }

  .market-note strong {
    color: var(--text);
    font-weight: 500;
  }

  .controls {
    max-width: 1100px;
    margin: 28px auto 0;
    padding: 0 32px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 10px 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn.active {
    background: var(--badge-bg);
    border-color: var(--accent);
    color: var(--accent);
  }

  .controls-divider {
    width: 1px;
    height: 24px;
    background: var(--border);
    flex-shrink: 0;
  }

  .stats-bar {
    max-width: 1100px;
    margin: 16px auto 0;
    padding: 0 32px;
    font-size: 12px;
    color: var(--muted);
  }

  .stats-bar span { color: var(--accent); }

  .mode-bar {
    max-width: 1100px;
    margin: 16px auto 0;
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .mode-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .mode-toggle {
    display: inline-flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    gap: 3px;
  }

  .mode-btn {
    background: transparent;
    border: none;
    border-radius: 6px;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .mode-btn.active {
    background: var(--badge-bg);
    color: var(--accent);
  }

  .mode-btn:not(.active):hover { color: var(--text); }

  main {
    max-width: 1100px;
    margin: 28px auto 60px;
    padding: 0 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .recipe-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
  }

  .recipe-card.has-image {
    padding: 0;
    overflow: hidden;
  }

  .card-image {
    height: 150px;
    background-size: cover;
    background-position: center;
    position: relative;
  }

  .card-body {
    padding: 18px 20px;
  }

  .img-badge {
    position: absolute;
    top: 10px;
    right: 10px;
  }

  .img-badge.match-badge {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #15120c;
  }

  .card-meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .recipe-card:hover {
    border-color: #444;
    transform: translateY(-2px);
  }

  .recipe-card.has-offers {
    border-color: rgba(200,241,53,0.25);
  }

  .recipe-card.has-offers:hover {
    border-color: rgba(200,241,53,0.5);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
  }

  .recipe-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
    flex: 1;
  }

  .match-badge {
    flex-shrink: 0;
    background: var(--badge-bg);
    border: 1px solid rgba(200,241,53,0.3);
    border-radius: 6px;
    color: var(--accent);
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    white-space: nowrap;
  }

  .match-bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 14px;
    overflow: hidden;
  }

  .match-bar {
    height: 100%;
    background: var(--accent2);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .ingredients-list {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  .ing-tag {
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: transparent;
  }

  .ing-tag.matched {
    border-color: rgba(200,241,53,0.4);
    color: var(--accent);
    background: var(--badge-bg);
  }

  .ing-tag.offer {
    border-color: rgba(255,107,53,0.4);
    color: var(--accent2);
    background: rgba(255,107,53,0.08);
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .price-estimate {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .price-estimate .price-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: var(--muted);
    display: block;
    margin-bottom: 1px;
  }

  .savings-badge {
    font-size: 11px;
    color: var(--accent2);
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.25);
    border-radius: 5px;
    padding: 3px 8px;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    backdrop-filter: blur(4px);
    padding: 32px 16px;
    overflow-y: auto;
  }

  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

  .modal {
    background: #1c1c1c;
    border: 1px solid #333;
    border-radius: 16px;
    max-width: 680px;
    width: 100%;
    padding: 32px;
    position: relative;
    margin: auto;
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: var(--border);
    border: none;
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
  }

  .modal-close:hover { color: var(--text); }

  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 6px;
  }

  .modal-image {
    height: 200px;
    background-size: cover;
    background-position: center;
    border-radius: 12px;
    margin-bottom: 16px;
  }

  .modal-meta {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .modal-keywords {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
  }

  .modal-keywords span {
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
  }

  .modal-url {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .modal-url a { color: var(--accent); text-decoration: none; }

  .modal-section-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .modal-ingredients {
    list-style: none;
    margin-bottom: 24px;
  }

  .modal-ingredients li {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .modal-ingredients li:last-child { border-bottom: none; }

  .ing-raw {
    color: var(--muted);
    font-size: 12px;
  }

  .ing-product-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  a.ing-product-row, a.ing-alt-row {
    text-decoration: none;
    color: inherit;
    border-radius: 6px;
    transition: background 0.15s;
  }

  a.ing-product-row.clickable { padding: 4px 6px; margin: 0 -6px; }
  a.ing-alt-row.clickable { padding: 2px 6px; margin: 0 -6px; }

  a.ing-product-row.clickable:hover,
  a.ing-alt-row.clickable:hover {
    background: var(--badge-bg);
  }

  .ext-icon {
    color: var(--accent);
    font-size: 11px;
    opacity: 0.7;
  }

  .modal-btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .modal-rewe-btn {
    flex: 1;
    min-width: 200px;
    background: var(--accent2);
    color: #0f0f0f;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 12px 20px;
    cursor: pointer;
    transition: opacity 0.2s;
    text-align: center;
    text-decoration: none;
    display: inline-block;
  }

  .modal-rewe-btn:hover { opacity: 0.85; }

  .modal-market-hint {
    margin-top: 12px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.4;
  }

  .ing-product-name {
    font-size: 13px;
    color: var(--text);
  }

  .ing-alternatives {
    margin-top: 2px;
    padding-left: 8px;
    border-left: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .ing-alt-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    gap: 12px;
  }

  .ing-match-info {
    font-size: 12px;
    color: var(--accent);
    text-align: right;
    flex-shrink: 0;
  }

  .ing-offer-tag {
    font-size: 10px;
    color: var(--accent2);
    background: rgba(255,107,53,0.1);
    border-radius: 4px;
    padding: 2px 6px;
    margin-left: 6px;
  }

  /* Mengen-/Paket-Anzeige */
  .ing-pkg-badge {
    font-size: 10px;
    font-weight: 600;
    color: var(--accent);
    background: var(--badge-bg);
    border: 1px solid rgba(200,241,53,0.3);
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 6px;
    white-space: nowrap;
  }

  .ing-pkg-badge.alt {
    font-size: 9px;
    padding: 0 5px;
  }

  .ing-pkg-unit {
    font-size: 10px;
    color: var(--muted);
    font-weight: 400;
    white-space: nowrap;
  }

  .ing-overshoot {
    display: block;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .modal-price-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .modal-price-big {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
  }

  .modal-price-note {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .modal-savings {
    text-align: right;
  }

  .modal-savings .saved-amount {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--accent2);
  }

  .modal-savings .saved-label {
    font-size: 11px;
    color: var(--muted);
  }

  .modal-link-btn {
    display: inline-block;
    background: var(--accent);
    color: #0f0f0f;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 12px 24px;
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .modal-link-btn:hover { opacity: 0.85; }

  /* Loading */
  .loading {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
    font-size: 14px;
  }

  .loading-dot {
    display: inline-block;
    animation: blink 1.2s infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  #load-more-wrap {
    display: flex;
    justify-content: center;
    padding: 0 32px 60px;
    max-width: 1100px;
    margin: 0 auto;
  }

  #load-more-btn {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 10px;
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 14px 32px;
    cursor: pointer;
    transition: all 0.2s;
  }

  #load-more-btn:hover {
    background: var(--badge-bg);
  }

  #load-more-count {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    color: var(--muted);
    font-size: 13px;
  }

  @media (max-width: 600px) {
    header, .controls, .stats-bar, .mode-bar, main { padding-left: 16px; padding-right: 16px; }
    main { grid-template-columns: 1fr; }
    .modal { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-label">REWE × Chefkoch</div>
  <h1>Kochen was<br><span>im Angebot</span> ist.</h1>
  <p class="subtitle">Rezepte sortiert nach Anteil der rabattierten Zutaten — mit geschätzten Gesamtkosten.</p>
  <p class="market-note">📍 Angebote &amp; Preise gelten für <strong>REWE Töpchiner Weg 189-193, 12309 Berlin-Lichtenrade</strong>. In anderen Märkten können Preise abweichen.</p>
</header>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Rezept oder Zutat suchen…" autocomplete="off">
  </div>
  <button class="filter-btn active" id="btn-all" onclick="setFilter('all')">Alle</button>
  <button class="filter-btn" id="btn-offers" onclick="setFilter('offers')">Nur mit Angeboten</button>
  <button class="filter-btn" id="btn-full-match" onclick="setFilter('full-match')">100% Match</button>
  <div class="controls-divider"></div>
  <button class="filter-btn active" id="btn-sort-offers" onclick="setSort('offers')">↓ Angebote</button>
  <button class="filter-btn" id="btn-sort-savings" onclick="setSort('savings')">↓ Ersparnis €</button>
</div>

<div class="mode-bar">
  <span class="mode-label">Einkaufsmodus</span>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-mode-offers" onclick="setPriceMode('offers')"
            title="Bevorzugt Produkte im Angebot. Nur wenn es kein Angebot gibt, wird das günstigste reguläre Produkt gewählt.">
      🏷 Angebote shoppen
    </button>
    <button class="mode-btn" id="btn-mode-cheapest" onclick="setPriceMode('cheapest')"
            title="Wählt immer das absolut günstigste Produkt (Preis × benötigte Pakete), egal ob im Angebot oder nicht.">
      € Günstigster Preis
    </button>
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<main id="grid">
  <div class="loading">Daten werden geladen<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span></div>
</main>

<div id="load-more-wrap" style="display:none">
  <button id="load-more-btn" onclick="loadMore()">
    Mehr anzeigen <span id="load-more-count"></span>
  </button>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let allProducts = [];
let allRecipes  = [];
let ranked      = [];
let productById  = {};
let activeFilter = 'all';
let activeSort   = 'offers';  // 'offers' | 'savings'
let priceMode    = 'offers';  // 'offers' = Angebote bevorzugen | 'cheapest' = absolut günstigster (paket-bereinigter) Preis
let searchQuery  = '';
let displayCount = 60;
let filteredData = [];

// ─── Ranking (Matching bereits vorberechnet in matched_recipes.json) ──────────
function pickProduct(ing, productById) {
  // Verglichen wird immer nach paket-bereinigten Gesamtkosten (price ×
  // benötigte Pakete). Ohne package_info ist packages === 1, also Stückpreis.
  //   priceMode 'offers'   -> Angebots-Pool gewinnt; nur wenn es kein Angebot
  //                           gibt, treten die regulären Produkte an.
  //   priceMode 'cheapest' -> absolut günstigste Wahl über ALLE Produkte,
  //                           Angebotsstatus egal.
  const products = (ing.product_ids || [])
    .map(id => productById[id])
    .filter(Boolean);
  if (!products.length) return null;

  let pool = products;
  if (priceMode === 'offers') {
    const offers = products.filter(p => p.on_offer);
    if (offers.length) pool = offers;
  }

  const effCost = p => p.price * resolvePackage(ing, p).packages;
  return pool.reduce((a, b) => effCost(a) <= effCost(b) ? a : b);
}

// package_info ist ein rein additives Feld aus matched_recipes.json und nur
// fuer Paare mit eindeutiger Mengenberechnung vorhanden. Fehlt der Eintrag
// (Dimensions-Mismatch, bewusster None-Fall in quantity_matching.py) -> 1
// Packung, kein Multiplikator, kein Badge. Wir lesen defensiv, damit eine
// fehlende/teilweise Struktur niemals NaN in die Preissummen traegt.
function resolvePackage(ing, product) {
  const info = (ing && ing.package_info && product) ? ing.package_info[product.id] : null;
  let packages = 1, overshoot = null, dimension = null;
  if (info && Number.isFinite(info.packages_needed) && info.packages_needed >= 1) {
    packages  = info.packages_needed;
    dimension = info.dimension ?? null;
    if (Number.isFinite(info.product_amount) && Number.isFinite(info.ingredient_amount)) {
      // Wieviel mehr man kauft, als das Rezept braucht (ceil-Ueberhang).
      overshoot = Math.max(0, packages * info.product_amount - info.ingredient_amount);
    }
  }
  return { packages, overshoot, dimension };
}

function rankRecipes(recipes, productById) {
  return recipes.map(recipe => {
    const ingMatches = recipe.I.map(ing => {
      const product = ing.product_ids?.length
        ? pickProduct(ing, productById)
        : null;
      const { packages, overshoot, dimension } = resolvePackage(ing, product);
      return {
        raw: ing.raw, product,
        packagesNeeded: packages, overshoot, dimension,
        ing,  // fuer das Modal: package_info auch der Alternativ-Produkte
        allProducts: (ing.product_ids || []).map(id => productById[id]).filter(Boolean),
      };
    });

    const matched  = ingMatches.filter(m => m.product);
    const onOffer  = matched.filter(m => m.product.on_offer);

    const offerScore = matched.length > 0 ? onOffer.length / matched.length : 0;
    const matchScore = recipe.I.length  > 0 ? matched.length / recipe.I.length : 0;

    // Preis & Ersparnis skalieren mit der benoetigten Paketzahl. Ohne
    // package_info ist packagesNeeded === 1, also identisch zum alten Verhalten.
    const totalCent = matched.reduce((s, m) => s + m.product.price * m.packagesNeeded, 0);
    const regularCent = matched.reduce((s, m) =>
      s + (m.product.price_regular || m.product.price) * m.packagesNeeded, 0);
    const savingsCent = regularCent - totalCent;

    return {
      recipe, ingMatches, offerScore, matchScore,
      onOfferCount: onOffer.length,
      matchedCount: matched.length,
      totalCent, savingsCent,
    };
  }).sort((a,b) =>
    b.onOfferCount - a.onOfferCount ||   // 1. die meisten Angebote absolut
    b.offerScore - a.offerScore ||        // 2. dann höchster Anteil
    b.matchScore - a.matchScore           // 3. dann beste Match-Quote
  );
}

// ─── Render ───────────────────────────────────────────────────────────────────
function formatPrice(cent) {
  return (cent / 100).toFixed(2).replace('.', ',') + ' €';
}

// ⚠️ ANNAHME — HIER PRUEFEN: die 'dimension'-Werte und die Basiseinheit von
// ingredient_amount / product_amount stammen aus quantity_matching.py. Ich
// rate hier engl. Feldnamen + Gramm/ml als Basis. Wenn deine dimension-Strings
// anders heissen (z.B. "Gewicht"/"weight_g"), nur diese Map anpassen — der
// Rest der Logik bleibt unveraendert. Unbekannte Dimension -> Ueberhang wird
// gar nicht angezeigt (sicherer als eine falsche Einheit).
const DIM_UNIT = { weight: 'g', volume: 'ml', count: 'Stück', piece: 'Stück', stueck: 'Stück' };
function formatOvershoot(amount, dimension) {
  const unit = DIM_UNIT[String(dimension || '').toLowerCase()];
  if (!unit || !(amount > 0)) return '';
  const fmt = n => (Math.round(n * 100) / 100).toString().replace('.', ',');
  if (unit === 'g'  && amount >= 1000) return `${fmt(amount / 1000)} kg`;
  if (unit === 'ml' && amount >= 1000) return `${fmt(amount / 1000)} l`;
  return `${fmt(amount)} ${unit}`;
}

function renderCard(r) {
  const pct = Math.round(r.offerScore * 100);
  const hasOffers = r.onOfferCount > 0;

  // Top 8 ingredients to show as tags -- sortiert nach Relevanz:
  // 1. im Angebot, 2. sonstiger Treffer, 3. kein Treffer. Innerhalb jeder
  // Gruppe bleibt die urspruengliche Rezept-Reihenfolge erhalten (stabile
  // Sortierung), damit es nicht willkuerlich wirkt. Ohne diese Sortierung
  // wuerden einfach die ersten 8 Zutaten der Original-Liste gezeigt, auch
  // wenn die interessanten Angebots-Treffer weiter hinten stehen.
  const priority = m => m.product ? (m.product.on_offer ? 0 : 1) : 2;
  const sortedMatches = r.ingMatches
    .map((m, idx) => ({ m, idx }))
    .sort((a, b) => priority(a.m) - priority(b.m) || a.idx - b.idx)
    .map(x => x.m);

  const tags = sortedMatches.slice(0, 8).map(m => {
    const cls = m.product
      ? (m.product.on_offer ? 'ing-tag offer' : 'ing-tag matched')
      : 'ing-tag';
    const label = m.raw.replace(/^\d+[^\s]*\s*/,'').split(',')[0];
    return `<li class="${cls}">${label}</li>`;
  }).join('');

  const priceStr = r.totalCent > 0 ? formatPrice(r.totalCent) : '—';
  const savingsStr = r.savingsCent > 50 ? `${formatPrice(r.savingsCent)} gespart` : '';

  const rec = r.recipe;
  const metaParts = [];
  if (rec.rating) metaParts.push(`★ ${rec.rating} ${rec.rating_count ? `(${rec.rating_count})` : ''}`);
  if (rec.time)   metaParts.push(`⏱ ${rec.time}`);
  if (rec.yield)  metaParts.push(rec.yield);
  const metaLine = metaParts.length
    ? `<div class="card-meta">${metaParts.join(' · ')}</div>` : '';

  const imageHtml = rec.image
    ? `<div class="card-image" style="background-image:url('${rec.image}')">
         ${hasOffers ? `<div class="match-badge img-badge">🏷 ${r.onOfferCount} im Angebot</div>` : ''}
       </div>` : '';

  return `
  <div class="recipe-card ${hasOffers ? 'has-offers' : ''} ${rec.image ? 'has-image' : ''}"
       onclick='openModal(${JSON.stringify(rec.U)})'>
    ${imageHtml}
    <div class="card-body">
      <div class="card-top">
        <div class="recipe-name">${rec.N}</div>
        ${(!rec.image && hasOffers) ? `<div class="match-badge">🏷 ${r.onOfferCount} im Angebot</div>` : ''}
      </div>
      ${metaLine}
      <div class="match-bar-wrap">
        <div class="match-bar" style="width:${pct}%"></div>
      </div>
      <ul class="ingredients-list">${tags}</ul>
      <div class="card-footer">
        <div class="price-estimate">
          <span class="price-label">ca. Preis</span>
          ${priceStr}
        </div>
        ${savingsStr ? `<div class="savings-badge">↓ ${savingsStr}</div>` : ''}
      </div>
    </div>
  </div>`;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  let data = [...ranked];

  if (activeFilter === 'offers') {
    data = data.filter(r => r.onOfferCount > 0);
  } else if (activeFilter === 'full-match') {
    // matchScore = matched.length / recipe.I.length (siehe rankRecipes()).
    // Gleitkomma-Vergleich bewusst mit Toleranz statt === 1, falls durch
    // Rundung minimal abweichende Werte auftreten.
    data = data.filter(r => r.matchScore >= 0.999);
  }

  if (activeSort === 'savings') {
    data = data.slice().sort((a,b) => b.savingsCent - a.savingsCent);
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    data = data.filter(r =>
      r.recipe.N.toLowerCase().includes(q) ||
      r.recipe.I.some(i => i.raw.toLowerCase().includes(q))
    );
  }

  filteredData = data;  // für load-more merken
  const shown = data.slice(0, displayCount);

  document.getElementById('stats-bar').innerHTML =
    `<span>${shown.length}</span> von <span>${data.length}</span> Rezepten · ` +
    `<span>${allProducts.filter(p=>p.on_offer).length}</span> Produkte im Angebot`;

  if (!shown.length) {
    grid.innerHTML = '<div class="loading">Keine Rezepte gefunden.</div>';
    document.getElementById('load-more-wrap').style.display = 'none';
    return;
  }

  grid.className = '';
  grid.innerHTML = shown.map(renderCard).join('');

  // Load-more Button
  const wrap = document.getElementById('load-more-wrap');
  if (data.length > displayCount) {
    wrap.style.display = 'flex';
    document.getElementById('load-more-count').textContent =
      `${data.length - displayCount} weitere`;
  } else {
    wrap.style.display = 'none';
  }
}

function loadMore() {
  displayCount += 60;
  renderGrid();
}

// ─── Modal ────────────────────────────────────────────────────────────────────
let recipeByUrl = {};
let currentOfferLinks = [];
let reweMappingByUrl = {};

function openAllOffers() {
  // Öffnet jeden Angebots-Link in neuem Tab. Browser können Popups blocken;
  // der erste öffnet immer, für weitere ggf. Popups erlauben.
  currentOfferLinks.forEach((link, i) => {
    setTimeout(() => window.open(link, '_blank', 'noopener'), i * 100);
  });
}

function openModal(url) {
  const r = recipeByUrl[url];
  if (!r) return;

  const ingRows = r.ingMatches.map(m => {
    if (!m.product) return `<li><span class="ing-raw">${m.raw}</span></li>`;

    const cheapest = m.product;
    const alternatives = m.allProducts.filter(p => p.id !== cheapest.id);

    const linkAttr = cheapest.link
      ? `href="${cheapest.link}" target="_blank" rel="noopener"`
      : '';
    const tag = cheapest.link ? 'a' : 'div';

    // Mengen-Anpassung fuer das gewaehlte Produkt
    const n = m.packagesNeeded || 1;
    const pkgBadge = n > 1 ? `<span class="ing-pkg-badge">×${n} nötig</span>` : '';
    const priceHtml = n > 1
      ? `${formatPrice(cheapest.price * n)} <span class="ing-pkg-unit">(${n}×${formatPrice(cheapest.price)})</span>`
      : formatPrice(cheapest.price);
    const overshootStr = n > 1 ? formatOvershoot(m.overshoot, m.dimension) : '';
    const overshootHtml = overshootStr ? `<span class="ing-overshoot">≈ ${overshootStr} übrig</span>` : '';

    const cheapestHtml = `
      <${tag} class="ing-product-row${cheapest.link ? ' clickable' : ''}" ${linkAttr}>
        <span class="ing-product-name">${cheapest.name}${cheapest.link ? ' <span class="ext-icon">↗</span>' : ''}${pkgBadge}</span>
        <span class="ing-match-info">
          ${priceHtml}
          ${cheapest.on_offer ? `<span class="ing-offer-tag">-${cheapest.discount}%</span>` : ''}
          ${overshootHtml}
        </span>
      </${tag}>`;

    const altHtml = alternatives.length ? `
      <div class="ing-alternatives">
        ${alternatives.map(p => {
          const at = p.link ? 'a' : 'div';
          const al = p.link ? `href="${p.link}" target="_blank" rel="noopener"` : '';
          // Jede Alternative hat ggf. eine eigene Paketzahl (anderes Gewicht).
          const an = resolvePackage(m.ing, p).packages;
          const altBadge = an > 1 ? ` <span class="ing-pkg-badge alt">×${an}</span>` : '';
          const altPrice = an > 1 ? formatPrice(p.price * an) : formatPrice(p.price);
          return `<${at} class="ing-alt-row${p.link ? ' clickable' : ''}" ${al}>
            <span>${p.name}${p.link ? ' <span class="ext-icon">↗</span>' : ''}${altBadge}</span>
            <span>${altPrice}${p.on_offer ? ` <span class="ing-offer-tag">-${p.discount}%</span>` : ''}</span>
          </${at}>`;
        }).join('')}
      </div>` : '';

    return `<li>
      <span class="ing-raw">${m.raw}</span>
      ${cheapestHtml}${altHtml}
    </li>`;
  }).join('');

  const savingsSection = r.savingsCent > 50 ? `
    <div class="modal-savings">
      <div class="saved-amount">− ${formatPrice(r.savingsCent)}</div>
      <div class="saved-label">Ersparnis durch Angebote</div>
    </div>` : '';

  const rec = r.recipe;
  const metaParts = [];
  if (rec.rating) metaParts.push(`★ ${rec.rating}${rec.rating_count ? ` (${rec.rating_count} Bewertungen)` : ''}`);
  if (rec.time)   metaParts.push(`⏱ ${rec.time}`);
  if (rec.yield)  metaParts.push(`🍽 ${rec.yield}`);
  if (rec.category) metaParts.push(rec.category);
  const metaLine = metaParts.length
    ? `<div class="modal-meta">${metaParts.join(' · ')}</div>` : '';

  const imageHtml = rec.image
    ? `<div class="modal-image" style="background-image:url('${rec.image}')"></div>` : '';

  const keywordsHtml = (rec.keywords && rec.keywords.length)
    ? `<div class="modal-keywords">${rec.keywords.slice(0, 8).map(k => `<span>${k}</span>`).join('')}</div>`
    : '';

  // Links aller gematchten Angebots-Produkte für "Alle öffnen"
  const offerLinks = r.ingMatches
    .filter(m => m.product && m.product.on_offer && m.product.link)
    .map(m => m.product.link);
  // dedupe
  currentOfferLinks = [...new Set(offerLinks)];

  // Passender REWE-Mapping-Link (über die Chefkoch-URL des Rezepts).
  // Wenn vorhanden, öffnet der Button das fertige Rezept-Mapping bei REWE
  // (statt jede Zutat einzeln). Sonst Fallback auf "alle Angebote öffnen".
  const mappingUrl = reweMappingByUrl[url];
  let openAllBtn = '';
  if (mappingUrl) {
    const label = currentOfferLinks.length
      ? `🛒 ${currentOfferLinks.length} Angebot${currentOfferLinks.length > 1 ? 'e' : ''} bei REWE kaufen`
      : '🛒 Rezept bei REWE kaufen';
    openAllBtn = `<a class="modal-rewe-btn" href="${mappingUrl}" target="_blank" rel="noopener">${label}</a>`;
  } else if (currentOfferLinks.length) {
    openAllBtn = `<button class="modal-rewe-btn" onclick="openAllOffers()">
         🛒 ${currentOfferLinks.length} Angebot${currentOfferLinks.length > 1 ? 'e' : ''} bei REWE öffnen
       </button>`;
  }

  document.getElementById('modal-content').innerHTML = `
    <button class="modal-close" onclick="closeModal()">✕</button>
    ${imageHtml}
    <h2>${rec.N}</h2>
    ${metaLine}
    <div class="modal-url"><a href="${url}" target="_blank" rel="noopener">Rezept auf Chefkoch ↗</a></div>
    ${keywordsHtml}

    <div class="modal-section-label">Zutaten & Preise</div>
    <ul class="modal-ingredients">${ingRows}</ul>

    <div class="modal-price-box">
      <div>
        <div class="modal-price-big">${r.totalCent > 0 ? formatPrice(r.totalCent) : '—'}</div>
        <div class="modal-price-note">geschätzte Zutatenkosten · ${r.matchedCount} von ${rec.I.length} Zutaten gefunden</div>
      </div>
      ${savingsSection}
    </div>

    <div class="modal-btn-row">
      ${openAllBtn}
      <a class="modal-link-btn" href="${url}" target="_blank" rel="noopener">Zum Rezept →</a>
    </div>
    ${(currentOfferLinks.length || mappingUrl) ? `<p class="modal-market-hint">Angebotspreise gelten für REWE Berlin-Lichtenrade. Bitte diesen Markt bei REWE auswählen.</p>` : ''}
  `;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─── Controls ─────────────────────────────────────────────────────────────────
// Produktwahl hängt vom priceMode ab -> bei Moduswechsel muss neu geranked
// werden (Preis, Ersparnis und Sortierung ändern sich mit der Wahl).
function rebuild() {
  ranked = rankRecipes(allRecipes, productById);
  recipeByUrl = {};
  ranked.forEach(r => { recipeByUrl[r.recipe.U] = r; });
  renderGrid();
}

function setPriceMode(mode) {
  if (mode === priceMode) return;
  priceMode = mode;
  displayCount = 60;
  document.getElementById('btn-mode-offers').classList.toggle('active', mode === 'offers');
  document.getElementById('btn-mode-cheapest').classList.toggle('active', mode === 'cheapest');
  rebuild();
}

function setFilter(f) {
  activeFilter = f;
  displayCount = 60;
  document.getElementById('btn-all').classList.toggle('active', f === 'all');
  document.getElementById('btn-offers').classList.toggle('active', f === 'offers');
  document.getElementById('btn-full-match').classList.toggle('active', f === 'full-match');
  renderGrid();
}

function setSort(s) {
  activeSort = s;
  displayCount = 60;
  document.getElementById('btn-sort-offers').classList.toggle('active', s === 'offers');
  document.getElementById('btn-sort-savings').classList.toggle('active', s === 'savings');
  renderGrid();
}

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  displayCount = 60;
  renderGrid();
});

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const [prodRes, recRes, mapRes] = await Promise.all([
      fetch('data/angebote.json'),
      fetch('data/matched_recipes.json'),
      fetch('data/rewe_mappings.jsonl'),
    ]);
    allProducts = await prodRes.json();
    allRecipes  = await recRes.json();

    // REWE-Mapping-Links pro Rezept: chefkoch_url (== recipe.U) -> rewe_mapping_url
    // Die jsonl-Datei enthält eine JSON-Zeile pro Rezept.
    reweMappingByUrl = {};
    const mapText = await mapRes.text();
    mapText.split('\n').forEach(line => {
      line = line.trim();
      if (!line) return;
      try {
        const m = JSON.parse(line);
        if (m.chefkoch_url && m.rewe_mapping_url) {
          reweMappingByUrl[m.chefkoch_url] = m.rewe_mapping_url;
        }
      } catch (e) { /* defekte Zeile überspringen */ }
    });

    // product_id → product lookup (global, damit rebuild() bei Moduswechsel
    // ohne erneutes Laden neu ranken kann)
    productById = {};
    allProducts.forEach(p => { productById[p.id] = p; });

    rebuild();
  } catch(err) {
    document.getElementById('grid').innerHTML =
      `<div class="loading">Fehler beim Laden der Daten.<br><small>${err.message}</small></div>`;
  }
}

init();
</script>
