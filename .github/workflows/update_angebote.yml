name: Angebote aktualisieren

on:
  schedule:
    - cron: '41 10 * * 0'  # eine stunde nach dem scraping
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install google-cloud-bigquery pandas db-dtypes

      - name: GCP Credentials einrichten
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/gcp_key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp_key.json" >> $GITHUB_ENV

      - name: Angebote aus BigQuery exportieren
        env:
          BQ_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          BQ_DATASET: ${{ secrets.BQ_DATASET }}
          BQ_TABLE: ${{ secrets.BQ_TABLE }}
        run: python scripts/export_bigquery.py

      # --- Rezept-Matching gegen die frischen Angebote ------------------------
      # Muss NACH dem angebote-Export (braucht data/angebote.json) und VOR
      # cheapest_mappings laufen (das liest das frische matched_recipes.json).
      # --from-matched matcht nur BEKANNTE Rezepte (aus dem committeten
      # matched_recipes.json) gegen den aktuellen Angebotskatalog.
      - name: Matching-Abhängigkeiten installieren
        run: pip install -r matching/requirements.txt

      # Neuesten Modell-Tag aufloesen -> Cache-Key. So wird das ~200-MB-Modell
      # nur neu gezogen, wenn tatsaechlich ein neuer Lauf getaggt wurde.
      - name: Modell-Revision auflösen
        id: ce_model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: echo "revision=$(python matching/download_model.py --print-revision)" >> "$GITHUB_OUTPUT"

      - name: Cross-Encoder-Modell cachen
        uses: actions/cache@v4
        with:
          path: matching/cross_encoder_model6_lauf18-final-produktionsmodell
          key: ce-model-${{ steps.ce_model.outputs.revision }}

      # CE_MODEL_VERSION bewusst NICHT setzen: model_fingerprint nimmt dann den
      # Inhalts-Hash der Gewichte (= Hash des geseedeten ce_pair_cache.json) ->
      # Cache-Hit. Mit gesetzter Version wuerde der Cache faelschlich verworfen.
      - name: Cross-Encoder-Modell laden
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CE_MODEL_REVISION: ${{ steps.ce_model.outputs.revision }}
        run: python matching/download_model.py

      - name: Rezepte gegen Angebote matchen
        run: python matching/match_jsonl_cache2.py --from-matched

      # Mapping-Daten für die Browser-Erweiterung neu berechnen (cheapest-Modus).
      # Liest das frisch gematchte matched_recipes.json + angebote.json.
      # Braucht nur die Python-Standardbibliothek.
      - name: cheapest_mappings.json bauen
        run: python scripts/build_cheapest_mappings.py

      - name: Änderungen committen und pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/angebote.json data/cheapest_mappings.json data/matched_recipes.json data/ce_pair_cache.json
          git diff --staged --quiet || git commit -m "Angebote aktualisiert: $(date -u '+%Y-%m-%d')"
          git push

  # Qualitäts-Gate: rechnet Katalog-Drift-Metriken aus den frisch gebauten
  # Artefakten (kein Neu-Scrape). Eigener Job -> der Export/Publish bleibt
  # grün, auch wenn dieser Gate rot wird (saubere Signal-Trennung).
  quality-gate:
    needs: export
    runs-on: ubuntu-latest

    steps:
      - name: Repo auschecken (frisch gepushter Stand)
        uses: actions/checkout@v4
        with:
          ref: main   # nicht der auslösende SHA, sondern der vom export gepushte Commit

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Nur Standardbibliothek -> kein pip install nötig.
      - name: Qualitäts-Metriken berechnen
        id: metrics
        run: python scripts/quality_gate.py

      # Snapshot + Historie immer fortschreiben (auch bei Regression), sonst
      # wandert die Diff-Baseline nie weiter und der Alarm bliebe ewig stehen.
      - name: Snapshot & Historie committen
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/catalog_ids_snapshot.json data/metrics_history.csv
          git diff --staged --quiet || git commit -m "Quality-Metriken: $(date -u '+%Y-%m-%d')"
          git push

      # Harter Fail nur auf der Invariante (stale muss 0 sein). missed_deals
      # ist ein Trend -> nur Warnung im Metrik-Step, kein Fail.
      - name: Bei Stale-Matches fehlschlagen
        if: always() && steps.metrics.outputs.stale != '0'
        run: |
          echo "::error::${{ steps.metrics.outputs.stale }} gematchte Produkte sind nicht mehr im Katalog (delisted) -- Matching lokal neu laufen lassen."
          exit 1
